name: Keep Render Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    environment: RENDER_HEALTH_URL
    steps:
      - name: Ping backend health endpoint
        env:
          HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "RENDER_HEALTH_URL secret is not set"
            exit 1
          fi

          base_url="${HEALTH_URL%/}"
          urls_to_try=()

          case "$base_url" in
            */health|*/api/health)
              urls_to_try+=("$base_url")
              ;;
            *)
              urls_to_try+=("$base_url/health" "$base_url/api/health" "$base_url")
              ;;
          esac

          success=0
          for url in "${urls_to_try[@]}"; do
            echo "Pinging $url"
            status_code=$(curl -sS -L -o /dev/null -w "%{http_code}" --max-time 30 "$url")
            echo "HTTP $status_code"

            if [ "$status_code" -ge 200 ] && [ "$status_code" -lt 400 ]; then
              success=1
              break
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Health check failed for all URL variants"
            exit 1
          fi
