name: Keep Render Backend Awake

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    environment: RENDER_HEALTH_URL
    steps:
      - name: Ping backend health endpoint
        env:
          HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "RENDER_HEALTH_URL secret is not set"
            exit 1
          fi

          provided_url="${HEALTH_URL%/}"
          base_url="$provided_url"
          base_url="${base_url%/health}"
          base_url="${base_url%/api/health}"

          urls_to_try=(
            "$provided_url"
            "$base_url/health"
            "$base_url/api/health"
            "$base_url"
          )

          success=0
          declare -A seen
          for url in "${urls_to_try[@]}"; do
            if [ -n "${seen[$url]}" ]; then
              continue
            fi
            seen[$url]=1

            echo "Pinging $url"
            status_code="$(curl -sS -L -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "$url" 2>/dev/null || true)"

            # When curl cannot connect (timeout/DNS/TLS), continue trying variants.
            if [ -z "$status_code" ] || [ "$status_code" = "000" ]; then
              echo "Request failed for $url"
              continue
            fi

            echo "HTTP $status_code"

            if [ "$status_code" -ge 200 ] && [ "$status_code" -lt 400 ]; then
              success=1
              break
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Health check failed for all URL variants"
            exit 1
          fi
